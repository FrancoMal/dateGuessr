<div class="container">
  <!-- Scoreboard -->
  <app-scoreboard #scoreboard></app-scoreboard>

  <div class="row">
    <div class="col-md-6 offset-md-3 text-center">

      <!-- Toggle Modo Histórico -->
      <div class="historical-toggle">
        <div class="form-check form-switch">
          <input
            class="form-check-input"
            type="checkbox"
            id="historicalModeSwitch"
            [checked]="historicalMode"
            (change)="toggleHistoricalMode()"
          />
          <label class="form-check-label text-white" for="historicalModeSwitch">
            Modo Histórico
          </label>
        </div>
      </div>

      <form (ngSubmit)="generateRandomDate()" class="d-inline-block">
        <div *ngIf="!historicalMode">
          <div class="form-group d-inline-block">
            <label for="date1" class="random-date">Año inicio:</label>
            <input
              type="number"
              class="form-control input-small"
              id="date1"
              name="date1"
              [(ngModel)]="date1"
              min="1900"
              max="2100"
            />
          </div>
          <div class="form-group d-inline-block">
            <label for="date2" class="random-date">Año fin:</label>
            <input
              type="number"
              class="form-control input-small"
              id="date2"
              name="date2"
              [(ngModel)]="date2"
              min="1900"
              max="2100"
            />
          </div>
        </div>
        <div class="d-inline-block align-middle ml-2">
          <button type="submit" class="btn btn-primary btn-lg">
            {{ historicalMode ? 'Fecha histórica aleatoria' : 'Generar fecha aleatoria' }}
          </button>
        </div>
      </form>

      <div *ngIf="randomDate" class="random-date">
        <h2>{{ historicalMode ? 'Fecha histórica:' : 'Fecha aleatoria generada:' }}</h2>
        <p>{{ formatShortDate(randomDate) }}</p>
        <p>{{ formatLongDate(randomDate) }}</p>
        <div id="Paso" *ngIf="showHints">
          <p>{{ hintText }}</p>
        </div>
      </div>

      <!-- Evento histórico revelado después de responder -->
      <div *ngIf="showEventName && currentHistoricalDate" class="historical-event">
        <p class="event-category">{{ currentHistoricalDate.category }}</p>
        <p class="event-name">{{ currentHistoricalDate.event }}</p>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 offset-md-3">
      <div class="button-group">
        <button
          *ngFor="let day of ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado']"
          type="button"
          class="btn btn-primary"
          (click)="checkAnswer(day)"
          [disabled]="!randomDate || answered"
          [ngClass]="{
            'btn-success': answered && day === correctDay,
            'btn-danger': answered && day === selectedDay && selectedDay !== correctDay
          }"
        >
          {{ day }}
          <ng-container *ngIf="showHints && hintsNumbers[day]">
            <div class="hints">
              <p *ngFor="let num of hintsNumbers[day]" class="hintNumb">
                {{ num }}
              </p>
            </div>
          </ng-container>
        </button>
      </div>

      <br />
      <br />
      <div *ngIf="resultMessage" class="random-date">
        <h3>{{ resultMessage }}</h3>
        <p *ngIf="lastPointsEarned > 0" class="points-earned">+{{ lastPointsEarned }} puntos</p>
      </div>
    </div>
    <button type="button" class="btn btn-primary" (click)="toggleHints()">
      Mostrar/ocultar consejos
    </button>
    <button type="button" class="btn btn-primary" (click)="toggleProcedure()">
      Mostrar/ocultar procedimiento
    </button>

    <app-procedure *ngIf="showProcedure && randomDate" [randomDate]="randomDate"></app-procedure>
  </div>
</div>
